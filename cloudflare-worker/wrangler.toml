name = "my-blog"
main = "worker.js"
compatibility_date = "2026-03-19"

routes = [
  { pattern = "bichonbuff.com", zone_name = "bichonbuff.com", custom_domain = true }
]

[observability]
enabled = true
[observability.logs]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "blog"
database_id = "c2b202a2-8c7d-4e24-b6cd-0e5493018228"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "blog-media"
