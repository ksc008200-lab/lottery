name = "krguide-auto-post"
main = "worker.js"
compatibility_date = "2024-01-01"

# 하루 3회 자동 포스팅: 오전 8시, 오후 2시, 저녁 8시 (UTC)
[triggers]
crons = ["0 5 * * *"]

[[kv_namespaces]]
binding = "ANALYTICS"
id = "74397da40d3f4386b6d15fc4ffb7357a"

# 환경변수는 Cloudflare Dashboard에서 Secret으로 설정하세요:
# ANTHROPIC_API_KEY
# WP_APP_PASSWORD
# WP_USERNAME
# WP_URL
