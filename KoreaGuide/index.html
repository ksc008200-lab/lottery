  <style>
    :root{--bg:#fff;--bg2:#f5f5f7;--card:#fff;--line:#d2d2d7;--line2:#e8e8eb;--muted:#86868b;--txt:#1d1d1f;--accent:#0071e3}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid rgba(0,0,0,.08)}
    .header-in{max-width:1200px;margin:0 auto;padding:13px 28px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:800;font-size:1.15rem;letter-spacing:-.03em;color:var(--txt);text-decoration:none}
    .brand span{color:var(--accent)}
    .nav{display:flex;gap:20px;align-items:center}
    .nav a{color:var(--muted);text-decoration:none;font-size:.84rem;font-weight:500;transition:color .15s}
    .nav a:hover{color:var(--txt)}
    .topbar{background:#fff;border-bottom:1px solid #e8e8eb;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .topbar::-webkit-scrollbar{display:none}
    .topbar-in{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:stretch;white-space:nowrap}
    .topbar-group{display:flex;align-items:center}
    .topbar-label{font-size:.68rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.06em;padding:0 10px 0 4px;white-space:nowrap}
    .topbar-group a{display:inline-flex;align-items:center;gap:4px;padding:9px 12px;font-size:.8rem;color:#86868b;text-decoration:none;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .topbar-group a:hover{color:#0071e3;border-bottom-color:#0071e3}
    .topbar-group a.active{color:#0071e3;border-bottom-color:#0071e3;font-weight:700}
    .layout{max-width:1200px;margin:0 auto;padding:32px 28px 60px;display:grid;grid-template-columns:220px 1fr;gap:40px}
    .sidebar{position:sticky;top:80px;align-self:start}
    .profile{text-align:center;margin-bottom:28px}
    .profile-initials{width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;margin:0 auto}
    .profile-name{margin:10px 0 2px;font-size:.95rem;font-weight:700;letter-spacing:-.02em}
    .profile-desc{font-size:.78rem;color:var(--muted);line-height:1.5}
    .side-section{margin-bottom:20px}
    .side-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:2px}
    .side-cat{display:block;padding:6px 10px;font-size:.84rem;color:var(--txt);text-decoration:none;border-radius:8px;font-weight:500;transition:background .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
    .side-cat:hover{background:var(--bg2)}
    .side-cat.active{background:var(--bg2);font-weight:700}
    .main-area h1{font-size:2rem;font-weight:800;letter-spacing:-.04em;margin:0 0 6px}
    .main-area .sub{font-size:.88rem;color:var(--muted);margin:0 0 24px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .card{background:var(--card);border:1px solid var(--line2);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .2s}
    .card:hover{box-shadow:0 6px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
    .card-link{display:block;text-decoration:none;color:inherit}
    .card-body{padding:14px 16px 12px}
    .card h3{margin:0 0 5px;font-size:.92rem;font-weight:700;letter-spacing:-.02em;color:var(--txt);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
    .card .excerpt{margin:0 0 8px;color:var(--muted);font-size:.8rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card .meta{font-size:.72rem;color:#a1a1a6;display:flex;align-items:center;gap:6px}
    .cat-badge{background:rgba(0,113,227,.08);color:var(--accent);padding:2px 7px;border-radius:10px;font-weight:600;font-size:.7rem}
    .thumb{aspect-ratio:16/10;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center}
    .thumb img{display:block;width:100%;height:100%;object-fit:cover}
    .thumb-placeholder{font-size:2rem;opacity:.3}
    .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
    footer{text-align:center;padding:24px 20px;margin-top:40px;border-top:1px solid var(--line2);font-size:.8rem;color:var(--muted)}
    footer a{color:inherit;text-decoration:none;margin:0 10px}
    footer a:hover{text-decoration:underline}
    .footer-copy{margin-top:8px;font-size:.75rem}
    @media(max-width:900px){.layout{grid-template-columns:1fr;gap:0}.sidebar{display:none}.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.layout{padding:16px 16px 40px}.header-in{padding:11px 16px}.grid{grid-template-columns:1fr}.main-area h1{font-size:1.6rem}}
  </style>

    </div>
  </aside>

  <main class="main-area">
    <h1 id="pageTitle">All Posts</h1>

<script src="posts.js"></script>
<script>
  let currentCategory = null;

  function renderPosts(category) {
    const grid = document.getElementById('postGrid');
    const filtered = category ? POSTS.filter(p => p.category === category) : POSTS;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h2>No posts yet</h2><p>Coming soon!</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(post => `
      <article class="card">
        <a href="${post.file}" class="card-link">
          <div class="thumb">
            ${post.thumbnail
              ? `<img src="${post.thumbnail}" alt="${post.title}">`
              : `<span class="thumb-placeholder">🇰🇷</span>`}
          </div>
          <div class="card-body">
            <h3>${post.title}</h3>
            <p class="excerpt">${post.excerpt}</p>
            <div class="meta">
              <span class="cat-badge">${post.category}</span>
              <span>${formatDate(post.date)}</span>
            </div>
          </div>
        </a>
      </article>
    `).join('');
  }

  function renderCategories() {
    const container = document.getElementById('sideCategories');
    container.innerHTML = CATEGORIES.map(cat => `
      <button class="side-cat" onclick="filterCategory('${cat}', this)">${cat}</button>
    `).join('');
  }

  function filterCategory(category, el) {
    currentCategory = category;
    document.querySelectorAll('.side-cat').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    const title = document.getElementById('pageTitle');
    const desc = document.getElementById('pageDesc');
    if (category) {
      title.textContent = category;
      desc.textContent = `All posts about ${category}`;
    } else {
      title.textContent = 'All Posts';
      desc.textContent = 'Travel, living, and language guides for Korea';
    }
    renderPosts(category);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  renderCategories();

  const urlCat = new URLSearchParams(location.search).get('cat') || null;
  document.querySelectorAll('#topbarCats a').forEach(a => {
    const cat = a.dataset.cat;
    if (cat === (urlCat || '')) a.classList.add('active');
  });
  if (urlCat) {
    document.querySelectorAll('.side-cat').forEach(b => {
      b.classList.toggle('active', b.textContent === urlCat);
    });
  }
  renderPosts(urlCat);
</script>
