<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-3425189666333844">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | KR Guide</title>
  <meta name="description" content="Get in touch with KR Guide. Send us your questions, suggestions, or feedback about Korea travel, living, or Korean language learning.">
  <link rel="canonical" href="https://krguide.com/contact.html">
  <style>
    :root{--bg:#fff;--bg2:#f5f5f7;--line2:#e8e8eb;--muted:#86868b;--txt:#1d1d1f;--accent:#0071e3;--radius:14px}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid rgba(0,0,0,.08)}
    .header-in{max-width:1200px;margin:0 auto;padding:13px 28px;display:flex;justify-content:space-between;align-items:center}
    .brand{font-weight:800;font-size:1.15rem;letter-spacing:-.03em;color:var(--txt);text-decoration:none}
    .brand span{color:var(--accent)}
    .nav{display:flex;gap:20px;align-items:center}
    .nav a{color:var(--muted);text-decoration:none;font-size:.84rem;font-weight:500;transition:color .15s}
    .nav a:hover,.nav a.active{color:var(--txt)}
    .topbar{background:#fff;border-bottom:1px solid #e8e8eb;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .topbar::-webkit-scrollbar{display:none}
    .topbar-in{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:stretch;white-space:nowrap}
    .topbar-group{display:flex;align-items:center}
    .topbar-label{font-size:.68rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.06em;padding:0 10px 0 4px;white-space:nowrap}
    .topbar-group a{display:inline-flex;align-items:center;gap:4px;padding:9px 12px;font-size:.8rem;color:#86868b;text-decoration:none;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .topbar-group a:hover{color:#0071e3;border-bottom-color:#0071e3}
    .page{max-width:600px;margin:3rem auto;padding:0 1.5rem 80px}
    h1{font-size:2rem;font-weight:800;letter-spacing:-.04em;margin:0 0 8px}
    .sub{color:var(--muted);font-size:.95rem;margin:0 0 36px;line-height:1.6}
    .box{background:var(--bg2);border-radius:var(--radius);padding:2rem}
    label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--txt)}
    input,textarea{width:100%;padding:10px 14px;border:1px solid var(--line2);border-radius:10px;font-size:.9rem;font-family:inherit;background:#fff;color:var(--txt);outline:none;transition:border .15s;margin-bottom:18px}
    input:focus,textarea:focus{border-color:var(--accent)}
    textarea{resize:vertical;min-height:130px}
    .btn{display:inline-block;background:var(--accent);color:#fff;font-size:.9rem;font-weight:600;padding:11px 28px;border-radius:var(--radius);border:none;cursor:pointer;transition:opacity .15s}
    .btn:hover{opacity:.85}
    footer{text-align:center;padding:24px 20px;margin-top:40px;border-top:1px solid var(--line2);font-size:.8rem;color:var(--muted)}
    footer a{color:inherit;text-decoration:none;margin:0 10px}
    footer a:hover{text-decoration:underline}
    .footer-copy{margin-top:8px;font-size:.75rem}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3425189666333844" crossorigin="anonymous"></script>
</head>
<body>
<header class="header">
  <div class="header-in">
    <a href="index.html" class="brand"><span>KR</span> Guide</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>
<div class="topbar">
  <div class="topbar-in">
    <div class="topbar-group">
      <span class="topbar-label">Categories</span>
      <a href="index.html">All</a>
      <a href="index.html?cat=Travel Guide">✈️ Travel Guide</a>
      <a href="index.html?cat=Living in Korea">🏠 Living in Korea</a>
      <a href="index.html?cat=Learn Korean">🗣️ Learn Korean</a>
    </div>
  </div>
</div>

<div class="page">
  <h1>Contact Us</h1>
  <p class="sub">Have a question about Korea, a correction to suggest, or just want to say hello? Send us a message.</p>
  <div class="box">
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Your message..." required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</div>

<footer>
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms of Use</a> |
  <a href="contact.html">Contact</a>
  <div class="footer-copy">© 2026 KR Guide. All rights reserved.</div>
</footer>
</body>
</html>
