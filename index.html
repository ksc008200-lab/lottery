<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 기반 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 기반 로또 번호 생성기</h1>
            <p>과거 당첨 번호 데이터를 분석하여 통계적으로 확률이 높은 번호를 추천합니다.</p>
        </header>
        <main>
            <div class="generator-panel">
                <button id="generate">행운의 번호 생성</button>
            </div>
            <div id="numbers-container">
                <p class="placeholder-text">버튼을 눌러 번호를 생성하세요.</p>
            </div>
        </main>
        <footer>
            <p>&copy; 2024 AI Lottery. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>

</html>
