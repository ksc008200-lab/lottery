<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 - 비숑 버프 자동화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #fff; --surface: #f5f5f7; --border: #e8e8eb; --text: #1d1d1f; --muted: #86868b; --accent: #0071e3; --radius: 14px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .page { max-width: 760px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 0.5px solid var(--border); }
  h1 { font-size: clamp(26px, 5vw, 36px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  h1 span { color: var(--accent); }
  .content-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; }
  p { font-size: 16px; color: var(--muted); line-height: 1.8; margin-bottom: 1.5rem; }
  .email-link {
    display: inline-block;
    font-size: 18px;
    color: var(--accent);
    background-color: rgba(0, 113, 227, 0.1);
    padding: 12px 24px;
    border-radius: var(--radius);
    text-decoration: none;
    transition: background-color 0.2s;
  }
  .email-link:hover { background-color: rgba(0, 113, 227, 0.2); }
  footer { text-align: center; margin-top: 3rem; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1><span>문의</span>하기</h1>
  </header>
  <div class="content-box">
    <p>블로그 내용, 자동화 프로그램, 기타 협업 관련 문의는<br>아래 이메일로 보내주시면 확인 후 회신드리겠습니다.</p>
    <a href="mailto:ksc008200@gmail.com" class="email-link">ksc008200@gmail.com</a>
  </div>
  <footer>
    <a href="index.html">홈으로 돌아가기</a>
  </footer>
</div>
</body>
</html>
