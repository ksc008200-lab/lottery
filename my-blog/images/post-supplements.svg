<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffcc02" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e64a19"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="pill4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="pill5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Background circles -->
  <circle cx="100" cy="100" r="150" fill="#fff9c4" opacity="0.5"/>
  <circle cx="1100" cy="650" r="200" fill="#ffe082" opacity="0.35"/>
  <circle cx="1050" cy="120" r="100" fill="#fff59d" opacity="0.4"/>
  <!-- Scattered dots -->
  <circle cx="150" cy="400" r="12" fill="#ff8f00" opacity="0.3"/>
  <circle cx="220" cy="280" r="8" fill="#1565c0" opacity="0.3"/>
  <circle cx="1000" cy="300" r="15" fill="#2e7d32" opacity="0.3"/>
  <circle cx="900" cy="180" r="10" fill="#e64a19" opacity="0.3"/>
  <!-- Pill 1 - Vitamin D (orange, large, center-left, angled) -->
  <g transform="rotate(-25, 420, 320)">
    <rect x="310" y="280" width="220" height="80" rx="40" fill="url(#pill1)"/>
    <rect x="310" y="280" width="110" height="80" rx="40" fill="#ff8f00"/>
    <line x1="420" y1="280" x2="420" y2="360" stroke="#e65100" stroke-width="2" opacity="0.4"/>
    <ellipse cx="360" cy="295" rx="15" ry="8" fill="#ffffff" opacity="0.3" transform="rotate(-25 360 295)"/>
  </g>
  <!-- Pill 2 - Omega3 (red/orange, right, angled) -->
  <g transform="rotate(15, 780, 250)">
    <rect x="680" y="210" width="200" height="75" rx="38" fill="url(#pill2)"/>
    <rect x="680" y="210" width="100" height="75" rx="38" fill="#e64a19"/>
    <line x1="780" y1="210" x2="780" y2="285" stroke="#bf360c" stroke-width="2" opacity="0.4"/>
    <ellipse cx="730" cy="225" rx="13" ry="7" fill="#ffffff" opacity="0.3" transform="rotate(15 730 225)"/>
  </g>
  <!-- Capsule 1 - Magnesium (green, large, bottom center) -->
  <g transform="rotate(10, 580, 480)">
    <rect x="460" y="440" width="240" height="85" rx="42" fill="url(#pill3)"/>
    <rect x="460" y="440" width="120" height="85" rx="42" fill="#2e7d32"/>
    <line x1="580" y1="440" x2="580" y2="525" stroke="#1b5e20" stroke-width="2" opacity="0.4"/>
    <ellipse cx="520" cy="457" rx="16" ry="9" fill="#ffffff" opacity="0.3" transform="rotate(10 520 457)"/>
  </g>
  <!-- Pill 3 - Probiotic (blue, top right area) -->
  <g transform="rotate(-10, 860, 400)">
    <rect x="760" y="360" width="200" height="78" rx="39" fill="url(#pill4)"/>
    <rect x="760" y="360" width="100" height="78" rx="39" fill="#1565c0"/>
    <line x1="860" y1="360" x2="860" y2="438" stroke="#0d47a1" stroke-width="2" opacity="0.4"/>
    <ellipse cx="810" cy="375" rx="14" ry="7" fill="#ffffff" opacity="0.3" transform="rotate(-10 810 375)"/>
  </g>
  <!-- Pill 4 - Vitamin C (purple, left area) -->
  <g transform="rotate(20, 280, 500)">
    <rect x="175" y="460" width="210" height="78" rx="39" fill="url(#pill5)"/>
    <rect x="175" y="460" width="105" height="78" rx="39" fill="#6a1b9a"/>
    <line x1="280" y1="460" x2="280" y2="538" stroke="#4a148c" stroke-width="2" opacity="0.4"/>
    <ellipse cx="227" cy="476" rx="14" ry="7" fill="#ffffff" opacity="0.3" transform="rotate(20 227 476)"/>
  </g>
  <!-- Small round pills scattered -->
  <circle cx="500" cy="200" r="32" fill="#ff7043" opacity="0.85"/>
  <circle cx="500" cy="200" r="18" fill="#ff8a65" opacity="0.7"/>
  <circle cx="700" cy="540" r="28" fill="#42a5f5" opacity="0.85"/>
  <circle cx="700" cy="540" r="16" fill="#64b5f6" opacity="0.7"/>
  <circle cx="950" cy="490" r="25" fill="#ab47bc" opacity="0.85"/>
  <circle cx="950" cy="490" r="14" fill="#ce93d8" opacity="0.7"/>
  <!-- Text background -->
  <rect x="260" y="640" width="680" height="72" rx="36" fill="#e65100" opacity="0.85"/>
  <!-- Text -->
  <text x="600" y="687" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">꼭 챙겨야 할 영양제 TOP 5</text>
</svg>
