<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f8e9"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#ef9a9a"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Background decorations -->
  <circle cx="150" cy="150" r="180" fill="#c5e1a5" opacity="0.3"/>
  <circle cx="1050" cy="600" r="220" fill="#aed581" opacity="0.25"/>
  <!-- Plate shadow -->
  <ellipse cx="600" cy="590" rx="230" ry="30" fill="#8d6e63" opacity="0.12"/>
  <!-- Plate -->
  <circle cx="600" cy="390" r="220" fill="url(#plate)"/>
  <circle cx="600" cy="390" r="220" fill="none" stroke="#bdbdbd" stroke-width="4"/>
  <circle cx="600" cy="390" r="185" fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.7"/>
  <!-- Food on plate -->
  <!-- Brown rice / grains (beige area, top-right quadrant) -->
  <path d="M600 390 L600 210 A180 180 0 0 1 780 390 Z" fill="#d7ccc8"/>
  <!-- Small grain dots -->
  <circle cx="665" cy="290" r="5" fill="#bcaaa4" opacity="0.7"/>
  <circle cx="690" cy="310" r="4" fill="#bcaaa4" opacity="0.7"/>
  <circle cx="655" cy="320" r="5" fill="#bcaaa4" opacity="0.7"/>
  <circle cx="700" cy="280" r="4" fill="#bcaaa4" opacity="0.7"/>
  <circle cx="720" cy="330" r="5" fill="#bcaaa4" opacity="0.7"/>
  <circle cx="680" cy="350" r="4" fill="#bcaaa4" opacity="0.7"/>
  <!-- Broccoli (green area, top-left) -->
  <path d="M600 390 L420 390 A180 180 0 0 1 600 210 Z" fill="#66bb6a"/>
  <circle cx="520" cy="295" r="32" fill="#43a047"/>
  <circle cx="545" cy="270" r="26" fill="#43a047"/>
  <circle cx="497" cy="272" r="24" fill="#43a047"/>
  <circle cx="530" cy="250" r="20" fill="#66bb6a"/>
  <circle cx="505" cy="248" r="18" fill="#66bb6a"/>
  <circle cx="555" cy="252" r="18" fill="#66bb6a"/>
  <!-- Chicken / protein (bottom-right) -->
  <path d="M600 390 L780 390 A180 180 0 0 1 600 570 Z" fill="#ffcc80"/>
  <path d="M630 420 Q700 430 740 480 Q700 510 660 510 Q620 500 620 460 Z" fill="#ffb74d"/>
  <path d="M640 435 Q690 440 720 470" stroke="#ff8f00" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Salad greens (bottom-left) -->
  <path d="M600 390 L600 570 A180 180 0 0 1 420 390 Z" fill="#a5d6a7"/>
  <ellipse cx="500" cy="490" rx="45" ry="25" fill="#81c784" transform="rotate(-20 500 490)"/>
  <ellipse cx="530" cy="510" rx="38" ry="20" fill="#66bb6a" transform="rotate(10 530 510)"/>
  <ellipse cx="475" cy="510" rx="35" ry="18" fill="#4caf50" transform="rotate(-30 475 510)"/>
  <!-- Divider lines on plate -->
  <line x1="600" y1="210" x2="600" y2="570" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  <line x1="420" y1="390" x2="780" y2="390" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  <!-- Weight scale left (old, heavy) -->
  <rect x="80" y="350" width="140" height="14" rx="7" fill="#ef9a9a"/>
  <polygon points="150,250 110,350 190,350" fill="#e57373"/>
  <text x="150" y="240" font-family="sans-serif" font-size="22" fill="#c62828" text-anchor="middle" font-weight="bold">전</text>
  <!-- Arrow right -->
  <text x="370" y="405" font-family="sans-serif" font-size="55" fill="#4caf50" font-weight="bold">→</text>
  <!-- Weight scale right (new, lighter) -->
  <rect x="980" y="380" width="140" height="14" rx="7" fill="#a5d6a7"/>
  <polygon points="1050,290 1010,380 1090,380" fill="#81c784"/>
  <text x="1050" y="278" font-family="sans-serif" font-size="22" fill="#1b5e20" text-anchor="middle" font-weight="bold">후</text>
  <!-- Fork & knife -->
  <line x1="360" y1="500" x2="360" y2="620" stroke="#9e9e9e" stroke-width="8" stroke-linecap="round"/>
  <line x1="345" y1="500" x2="345" y2="540" stroke="#9e9e9e" stroke-width="5" stroke-linecap="round"/>
  <line x1="360" y1="500" x2="360" y2="540" stroke="#9e9e9e" stroke-width="5" stroke-linecap="round"/>
  <line x1="375" y1="500" x2="375" y2="540" stroke="#9e9e9e" stroke-width="5" stroke-linecap="round"/>
  <line x1="840" y1="500" x2="840" y2="620" stroke="#9e9e9e" stroke-width="8" stroke-linecap="round"/>
  <path d="M825 500 Q840 530 840 550" stroke="#9e9e9e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Text background -->
  <rect x="240" y="648" width="720" height="72" rx="36" fill="#33691e" opacity="0.85"/>
  <!-- Text -->
  <text x="600" y="695" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">요요 없이 살 빼는 방법</text>
</svg>
