<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Background decorations -->
  <circle cx="100" cy="650" r="200" fill="#90caf9" opacity="0.2"/>
  <circle cx="1100" cy="100" r="180" fill="#64b5f6" opacity="0.2"/>
  <!-- Nutrition cards - 2x2 grid -->
  <!-- Card 1: Protein -->
  <rect x="120" y="180" width="220" height="170" rx="20" fill="url(#card1)" filter="url(#cardshadow)"/>
  <text x="230" y="245" font-family="sans-serif" font-size="44" text-anchor="middle">🥩</text>
  <text x="230" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">단백질</text>
  <text x="230" y="318" font-family="sans-serif" font-size="15" fill="#bbdefb" text-anchor="middle">근육 유지 필수</text>
  <!-- Card 2: Calcium -->
  <rect x="370" y="180" width="220" height="170" rx="20" fill="url(#card2)" filter="url(#cardshadow)"/>
  <text x="480" y="245" font-family="sans-serif" font-size="44" text-anchor="middle">🥛</text>
  <text x="480" y="290" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">칼슘</text>
  <text x="480" y="318" font-family="sans-serif" font-size="15" fill="#c8e6c9" text-anchor="middle">뼈 건강 유지</text>
  <!-- Card 3: Fiber -->
  <rect x="120" y="380" width="220" height="170" rx="20" fill="url(#card3)" filter="url(#cardshadow)"/>
  <text x="230" y="445" font-family="sans-serif" font-size="44" text-anchor="middle">🥦</text>
  <text x="230" y="490" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">식이섬유</text>
  <text x="230" y="518" font-family="sans-serif" font-size="15" fill="#ffe0b2" text-anchor="middle">장 건강 개선</text>
  <!-- Card 4: Omega3 -->
  <rect x="370" y="380" width="220" height="170" rx="20" fill="url(#card4)" filter="url(#cardshadow)"/>
  <text x="480" y="445" font-family="sans-serif" font-size="44" text-anchor="middle">🐟</text>
  <text x="480" y="490" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">오메가-3</text>
  <text x="480" y="518" font-family="sans-serif" font-size="15" fill="#e1bee7" text-anchor="middle">심혈관 보호</text>
  <!-- Bowl / plate center right -->
  <ellipse cx="900" cy="590" rx="200" ry="25" fill="#90a4ae" opacity="0.2"/>
  <path d="M700 400 Q900 350 1100 400 Q1100 580 900 600 Q700 580 700 400 Z" fill="url(#bowl)"/>
  <path d="M700 400 Q900 360 1100 400 Q900 380 700 400 Z" fill="#eeeeee"/>
  <!-- Food in bowl -->
  <!-- Rice base -->
  <ellipse cx="900" cy="490" rx="155" ry="80" fill="#fff8e1"/>
  <!-- Broccoli -->
  <circle cx="840" cy="450" r="35" fill="#43a047"/>
  <circle cx="840" cy="425" r="22" fill="#66bb6a"/>
  <circle cx="820" cy="432" r="18" fill="#43a047"/>
  <circle cx="858" cy="430" r="20" fill="#66bb6a"/>
  <!-- Egg / protein -->
  <ellipse cx="940" cy="455" rx="38" ry="30" fill="#fff9c4"/>
  <ellipse cx="940" cy="455" rx="20" ry="16" fill="#ff8f00"/>
  <!-- Fish piece -->
  <path d="M975 480 Q1010 460 1045 470 Q1040 500 1005 505 Q975 505 975 480 Z" fill="#ff7043"/>
  <path d="M990 475 Q1020 468 1035 475" stroke="#e64a19" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Chopsticks / spoon -->
  <line x1="1080" y1="340" x2="1020" y2="470" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <line x1="1110" y1="330" x2="1040" y2="480" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <!-- Age badge -->
  <rect x="830" y="170" width="200" height="70" rx="35" fill="#1565c0" opacity="0.9"/>
  <text x="930" y="213" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">60대 이상</text>
  <!-- Text background -->
  <rect x="200" y="655" width="800" height="72" rx="36" fill="#0d47a1" opacity="0.82"/>
  <!-- Main text -->
  <text x="600" y="702" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">시니어 건강을 위한 식단</text>
</svg>
