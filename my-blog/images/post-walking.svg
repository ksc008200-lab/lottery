<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#81c784"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Sky circles decoration -->
  <circle cx="980" cy="120" r="140" fill="#ffffff" opacity="0.15"/>
  <circle cx="1050" cy="90" r="90" fill="#ffffff" opacity="0.12"/>
  <circle cx="200" cy="650" r="200" fill="#4caf50" opacity="0.15"/>
  <!-- Ground -->
  <ellipse cx="600" cy="720" rx="700" ry="80" fill="#4caf50" opacity="0.25"/>
  <!-- Path dots -->
  <circle cx="200" cy="590" r="10" fill="#ffffff" opacity="0.5"/>
  <circle cx="320" cy="600" r="10" fill="#ffffff" opacity="0.5"/>
  <circle cx="440" cy="590" r="10" fill="#ffffff" opacity="0.5"/>
  <circle cx="560" cy="600" r="10" fill="#ffffff" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="980" cy="120" r="70" fill="#fff9c4" opacity="0.85"/>
  <circle cx="980" cy="120" r="55" fill="#fff176" opacity="0.9"/>
  <!-- Sun rays -->
  <line x1="980" y1="30" x2="980" y2="10" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="1050" y1="50" x2="1065" y2="35" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="1070" y1="120" x2="1092" y2="120" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="1050" y1="190" x2="1065" y2="205" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="910" y1="50" x2="895" y2="35" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="888" y1="120" x2="868" y2="120" stroke="#fff176" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Walking figure -->
  <!-- Head -->
  <circle cx="600" cy="220" r="55" fill="#1b5e20"/>
  <!-- Face highlight -->
  <circle cx="615" cy="205" r="20" fill="#2e7d32" opacity="0.5"/>
  <!-- Body -->
  <path d="M560 275 Q600 270 640 275 L655 430 Q600 440 545 430 Z" fill="#2e7d32"/>
  <!-- Left arm (forward) -->
  <path d="M560 300 Q510 360 490 430" stroke="#1b5e20" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Right arm (back) -->
  <path d="M640 300 Q690 350 700 390" stroke="#1b5e20" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Left leg (forward, bent) -->
  <path d="M570 430 Q545 510 520 560 Q510 590 490 610" stroke="#1a6e1f" stroke-width="26" stroke-linecap="round" fill="none"/>
  <!-- Right leg (back, extended) -->
  <path d="M625 430 Q650 500 670 570" stroke="#1a6e1f" stroke-width="26" stroke-linecap="round" fill="none"/>
  <!-- Left shoe -->
  <ellipse cx="487" cy="618" rx="38" ry="15" fill="#1b5e20" transform="rotate(-15 487 618)"/>
  <!-- Right shoe -->
  <ellipse cx="672" cy="575" rx="38" ry="15" fill="#1b5e20" transform="rotate(10 672 575)"/>
  <!-- Motion lines -->
  <line x1="380" y1="300" x2="440" y2="300" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="390" y1="330" x2="435" y2="330" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="400" y1="358" x2="438" y2="358" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Text background pill -->
  <rect x="300" y="650" width="600" height="72" rx="36" fill="#1b5e20" opacity="0.75"/>
  <!-- Main text -->
  <text x="600" y="697" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">하루 30분 걷기의 건강 효과</text>
</svg>
