<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="cuff" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#b71c1c" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- Background decoration circles -->
  <circle cx="100" cy="200" r="180" fill="#f48fb1" opacity="0.2"/>
  <circle cx="1100" cy="550" r="220" fill="#f06292" opacity="0.15"/>
  <circle cx="950" cy="100" r="120" fill="#e91e63" opacity="0.1"/>
  <!-- Blood pressure monitor body -->
  <rect x="350" y="200" width="500" height="360" rx="24" fill="url(#monitor)" filter="url(#shadow)"/>
  <!-- Screen -->
  <rect x="375" y="225" width="450" height="200" rx="12" fill="url(#screen)"/>
  <!-- Screen glow -->
  <rect x="375" y="225" width="450" height="200" rx="12" fill="none" stroke="#3949ab" stroke-width="2" opacity="0.6"/>
  <!-- Blood pressure numbers -->
  <text x="530" y="320" font-family="'Courier New',monospace" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">120</text>
  <line x1="430" y1="338" x2="630" y2="338" stroke="#7986cb" stroke-width="1.5" opacity="0.6"/>
  <text x="530" y="395" font-family="'Courier New',monospace" font-size="60" font-weight="bold" fill="#90caf9" text-anchor="middle">80</text>
  <!-- mmHg label -->
  <text x="680" y="360" font-family="sans-serif" font-size="22" fill="#7986cb" text-anchor="middle">mmHg</text>
  <!-- Normal indicator -->
  <rect x="430" y="400" width="200" height="30" rx="15" fill="#4caf50" opacity="0.8"/>
  <text x="530" y="421" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">정상 범위</text>
  <!-- Monitor buttons -->
  <rect x="375" y="455" width="135" height="44" rx="10" fill="#546e7a"/>
  <rect x="525" y="455" width="135" height="44" rx="10" fill="#e53935"/>
  <rect x="675" y="455" width="75" height="44" rx="10" fill="#546e7a"/>
  <text x="442" y="483" font-family="sans-serif" font-size="14" fill="#cfd8dc" text-anchor="middle">설정</text>
  <text x="592" y="483" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">측정</text>
  <text x="712" y="483" font-family="sans-serif" font-size="13" fill="#cfd8dc" text-anchor="middle">기록</text>
  <!-- Cuff tube -->
  <path d="M350 380 Q250 380 200 350 Q150 320 180 260" stroke="#546e7a" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M350 380 Q250 380 200 350 Q150 320 180 260" stroke="#78909c" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Arm cuff -->
  <ellipse cx="180" cy="250" rx="80" ry="120" fill="url(#cuff)" opacity="0.9"/>
  <ellipse cx="180" cy="250" rx="60" ry="100" fill="#f5cdd3"/>
  <ellipse cx="180" cy="250" rx="60" ry="100" fill="none" stroke="#78909c" stroke-width="3" opacity="0.5"/>
  <!-- Pulse lines on arm -->
  <line x1="160" y1="220" x2="200" y2="220" stroke="#ef9a9a" stroke-width="2" opacity="0.7"/>
  <line x1="155" y1="250" x2="205" y2="250" stroke="#ef9a9a" stroke-width="2" opacity="0.7"/>
  <line x1="160" y1="280" x2="200" y2="280" stroke="#ef9a9a" stroke-width="2" opacity="0.7"/>
  <!-- Heart icon -->
  <path d="M950 200 C950 200 910 160 880 160 C850 160 830 180 830 205 C830 250 880 285 950 330 C1020 285 1070 250 1070 205 C1070 180 1050 160 1020 160 C990 160 950 200 950 200 Z" fill="url(#heart)" filter="url(#shadow)"/>
  <!-- Heart shine -->
  <ellipse cx="920" cy="195" rx="18" ry="12" fill="#ffffff" opacity="0.25" transform="rotate(-30 920 195)"/>
  <!-- ECG / Pulse wave -->
  <polyline points="750,560 800,560 830,500 850,620 875,480 900,560 950,560 980,560 1010,490 1030,560 1100,560" stroke="#f44336" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ECG background line -->
  <line x1="750" y1="560" x2="1100" y2="560" stroke="#f48fb1" stroke-width="2" stroke-dasharray="8,6" opacity="0.4"/>
  <!-- Labels -->
  <text x="950" y="640" font-family="sans-serif" font-size="20" fill="#c62828" text-anchor="middle" opacity="0.7">심박수 모니터링</text>
  <!-- Text background -->
  <rect x="230" y="660" width="740" height="72" rx="36" fill="#b71c1c" opacity="0.82"/>
  <!-- Main text -->
  <text x="600" y="707" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">혈압 낮추는 생활 습관 7가지</text>
</svg>
