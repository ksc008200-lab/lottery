<script>
  let currentCategory = null;

  function renderPosts(category) {
    const grid = document.getElementById('postGrid');
    const filtered = category ? POSTS.filter(p => p.category === category) : POSTS;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <h2>아직 글이 없습니다</h2>
          <p>post-template.html을 복사해<br>첫 번째 건강 글을 작성해보세요.</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(post => `
      <article class="card">
        <a href="${post.file}" class="card-link">
          <div class="thumb">
            ${post.thumbnail
              ? `<img src="${post.thumbnail}" alt="${post.title}">`
              : `<span class="thumb-placeholder">💚</span>`}
          </div>
          <div class="card-body">
            <h3>${post.title}</h3>
            <p class="excerpt">${post.excerpt}</p>
            <div class="meta">
              <span class="cat-badge">${post.category}</span>
              <span>${formatDate(post.date)}</span>
            </div>
          </div>
        </a>
      </article>
    `).join('');
  }

  function renderCategories() {
    const container = document.getElementById('sideCategories');
    container.innerHTML = CATEGORIES.map(cat => `
      <button class="side-cat" onclick="filterCategory('${cat}', this)">${cat}</button>
    `).join('');
  }

  function filterCategory(category, el) {
    currentCategory = category;
    document.querySelectorAll('.side-cat').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    const title = document.getElementById('pageTitle');
    const desc = document.getElementById('pageDesc');
    if (category) {
      title.textContent = category;
      desc.textContent = `${category} 관련 글 모음`;
    } else {
      title.textContent = '전체 글';
      desc.textContent = '60대 이상 시니어를 위한 건강정보 모음';
    }
    renderPosts(category);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  renderCategories();

  // URL 파라미터로 초기 카테고리 결정
  const urlCat = new URLSearchParams(location.search).get('cat') || null;

  // topbar active 동기화
  document.querySelectorAll('#topbarCats a').forEach(a => {
    const cat = a.dataset.cat;
    if (cat === (urlCat || '')) a.classList.add('active');
  });

  // 사이드바 active 동기화
  if (urlCat) {
    document.querySelectorAll('.side-cat').forEach(b => {
      b.classList.toggle('active', b.textContent === urlCat);
    });
  }

  renderPosts(urlCat);
</script>
