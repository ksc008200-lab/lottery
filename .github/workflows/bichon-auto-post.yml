name: Bichon Auto Blog Post

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 0:00 — 1편/일
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-to-bichon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate and post blog content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BICHON_API_KEY: ${{ secrets.BICHON_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/generate_bichon_post.py
